<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search results for physical therapists. Find licensed professionals by location, specialty, and availability.">
    <meta name="robots" content="index, follow">
    
    <title>Search Physical Therapists | Therapist Connect</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="maps.js"></script>
    
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9odfvT7EEt-edIxmAt_uZvPwNzWsJVvY&libraries=places,geometry&callback=initMap" async defer></script>
    
    <!-- Structured Data for Search Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SearchResultsPage",
      "name": "Physical Therapist Search Results",
      "description": "Search results for physical therapists"
    }
    </script>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="logo">
                <h1><a href="index.html">Therapist Connect</a></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html" class="active">Find Therapists</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-results">
            <div class="container">
                <div class="search-header">
                    <h1>Find Physical Therapists</h1>
                    <div class="search-box-inline">
                        <form action="search.html" method="get" class="search-form-inline">
                            <input 
                                type="text" 
                                name="specialty" 
                                id="specialty" 
                                placeholder="Specialty"
                                class="search-input-inline"
                            >
                            <input 
                                type="text" 
                                name="location" 
                                id="location" 
                                placeholder="Location or ZIP"
                                class="search-input-inline"
                            >
                            <button type="button" class="location-btn-inline" id="useLocation" title="Use current location">
                                📍
                            </button>
                            <button type="submit" class="search-btn-inline">Search</button>
                        </form>
                    </div>
                </div>

                <div class="results-container">
                    <div class="map-container">
                        <div id="map" style="width: 100%; height: 100%; border-radius: 12px;"></div>
                    </div>

                    <div class="results-list" id="resultsList">
                        <!-- Results will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Therapist Connect. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="search.js"></script>
    <script src="ai-assistant.js"></script>
</body>
</html>
